<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简日历</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            width: 100%;
            height: 100%;
            background: #FFFFFF;
            color: #000;
            font-family: 'Courier New', monospace;
            overflow: auto;
            font-size: 16px;
        }

        .container {
            width: 100%;
            min-height: 100vh;
            background: #FFFFFF;
            transform-origin: top left;
            transition: transform 0.3s;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100px;
            border-bottom: 2px solid #000;
            padding: 0 1rem;
            background: #FFFFFF;
        }

        .header-left {
            width: 200px;
        }

        .header-center {
            flex: 1;
            text-align: center;
        }

        .month-display {
            font-size: 4.29rem;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            line-height: 1;
        }

        .month-display:hover {
            background: #F5F5F5;
            border-radius: 5px;
            padding: 0 10px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
            width: 200px;
            justify-content: flex-end;
        }

        .btn {
            background: #FFFFFF;
            border: 2px solid #000;
            padding: 0.5rem 1rem;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
        }

        .btn:active { background: #E8E8E8; }

        #loginBtn {
            background: #FFFFFF;
            border: 2px solid #FFFFFF;
            color: #FFFFFF;
        }

        .user-info { 
            display: none; 
            gap: 0.8rem; 
            align-items: center; 
        }
        .user-info.show { 
            display: flex; 
        }

        .calendar-section {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .calendar {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0;
            overflow: hidden;
            background: #FFFFFF;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0;
        }

        .weekday {
            border: 2px solid #000;
            padding: 0;
            text-align: center;
            font-weight: bold;
            font-size: 1.24rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #FFFFFF;
            height: 38px;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-auto-rows: 90px;
            gap: 0;
            flex: 1;
            background: #FFFFFF;
            overflow-y: auto;
        }

        .day {
            border: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            cursor: pointer;
            overflow: hidden;
            background: #FFFFFF;
            gap: 0.1rem;
        }

        .day.today {
            border: 3px solid #000;
            background: #FFFFFF;
        }

        .day-num {
            font-size: 1.95rem;
            font-weight: bold;
            line-height: 1;
            margin-top: 0.2rem;
        }

        .day-lunar {
            font-size: 0.91rem;
            color: #333;
            margin-top: 0.1rem;
            font-weight: bold;
        }

        .day-festival {
            font-size: 0.78rem;
            font-weight: bold;
            color: #000;
            margin-top: 0.05rem;
        }

        .day-events {
            font-size: 0.91rem;
            color: #B22222;
            margin-top: 0.1rem;
            line-height: 1.1;
            font-weight: bold;
        }

        .day-event {
            text-overflow: ellipsis;
            overflow: hidden;
            white-space: nowrap;
            max-width: 100%;
        }

        .reminders-section {
            flex: 0 0 auto;
            border-top: 2px solid #000;
            overflow-y: auto;
            padding: 0.5rem 1rem;
            background: #FFFFFF;
        }

        .reminders-title {
            font-size: 1.43rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            padding-bottom: 0.3rem;
            border-bottom: 1px solid #000;
        }

        .reminders-list {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .reminder-item {
            font-size: 1.3rem;
            display: flex;
            gap: 0.5rem;
        }

        .reminder-date {
            font-weight: bold;
            min-width: 100px;
            flex-shrink: 0;
        }

        .reminder-content {
            flex: 1;
            color: #B22222;
            font-weight: bold;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }

        .modal-box {
            background: #FFFFFF;
            border: 3px solid #000;
            padding: 24px;
            width: 85%;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 16px;
            border-bottom: 2px solid #000;
            padding-bottom: 12px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 12px;
            font-size: 14px;
            border: 2px solid #000;
            font-family: inherit;
            background: #FFFFFF;
        }

        .checkbox-group {
            display: flex;
            gap: 1rem;
            margin-top: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .checkbox-item input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .btn-submit {
            flex: 1;
            background: #000;
            color: #FFF;
            border: none;
            padding: 14px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }

        .btn-close {
            flex: 1;
            background: #FFFFFF;
            border: 2px solid #000;
            padding: 14px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-close:active { background: #E8E8E8; }

        .msg { margin-bottom: 12px; padding: 10px; text-align: center; font-size: 13px; }
        .msg.err { background: #FFE6E6; border: 2px solid #B22222; color: #B22222; }
        .msg.ok { background: #E6FFE6; border: 2px solid #228B22; color: #228B22; }

        .month-picker {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .month-btn {
            padding: 10px;
            border: 2px solid #000;
            background: #FFFFFF;
            cursor: pointer;
            font-weight: bold;
        }

        .month-btn:hover {
            background: #F0F0F0;
        }

        .month-btn.selected {
            background: #000;
            color: #FFF;
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <div class="header">
            <div class="header-left"></div>
            <div class="header-center">
                <div class="month-display" id="monthDisplay" onclick="openMonthSelector()">五月</div>
            </div>
            <div class="header-right">
                <button class="btn" id="loginBtn">登录</button>
                <div class="user-info" id="userInfo">
                    <span id="username" style="font-size:0.9rem;font-weight:bold;">用户</span>
                    <button class="btn" id="settingsBtn">设置</button>
                    <button class="btn" id="logoutBtn">登出</button>
                </div>
            </div>
        </div>

        <div class="calendar-section">
            <div class="calendar">
                <div class="weekdays">
                    <div class="weekday">周一</div>
                    <div class="weekday">周二</div>
                    <div class="weekday">周三</div>
                    <div class="weekday">周四</div>
                    <div class="weekday">周五</div>
                    <div class="weekday">周六</div>
                    <div class="weekday">周日</div>
                </div>
                <div class="days" id="days"></div>
            </div>
        </div>

        <div class="reminders-section">
            <div class="reminders-title">下月及以后事项</div>
            <div class="reminders-list" id="remindersList"></div>
        </div>
    </div>

    <div class="modal" id="loginModal">
        <div class="modal-box">
            <div class="modal-title">登录</div>
            <div id="loginMsg"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="loginUser" required>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" class="form-input" id="loginPass" required>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn-submit">登录</button>
                    <button type="button" class="btn-close" onclick="closeLoginModal()">关闭</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="monthModal">
        <div class="modal-box">
            <div class="modal-title">选择月份</div>
            <form id="monthForm">
                <div class="form-group">
                    <label class="form-label">年份</label>
                    <input type="number" class="form-input" id="yearInput" min="2000" max="2100" value="2024">
                </div>
                <div class="form-group">
                    <label class="form-label">月份</label>
                    <div class="month-picker" id="monthPicker"></div>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn-submit">确定</button>
                    <button type="button" class="btn-close" onclick="closeMonthSelector()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="eventModal">
        <div class="modal-box">
            <div class="modal-title" id="eventTitle">添加事项</div>
            <form id="eventForm">
                <div class="form-group">
                    <label class="form-label">事项内容</label>
                    <input type="text" class="form-input" id="eventContent" maxlength="200" required>
                </div>
                <div class="form-group">
                    <label class="form-label">日期</label>
                    <input type="date" class="form-input" id="eventDate" required>
                </div>
                <div class="form-group">
                    <label class="form-label">重复模式</label>
                    <select class="form-select" id="eventRecurrence">
                        <option value="once">仅一次</option>
                        <option value="daily">每天</option>
                        <option value="weekly">每周</option>
                        <option value="monthly">每月</option>
                        <option value="yearly">每年</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="checkbox-item">
                        <input type="checkbox" id="eventPublic" checked>
                        <span>公开显示（默认勾选）</span>
                    </label>
                </div>
                <div class="btn-group">
                    <button type="submit" class="btn-submit">添加事项</button>
                    <button type="button" class="btn-close" onclick="closeEventModal()">取消</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 设置弹窗 -->
    <div class="modal" id="settingsModal">
        <div class="modal-box">
            <div class="modal-title">Kindle 截图设置</div>
            <div id="settingsMsg"></div>
            <div class="form-group">
                <label class="form-label">截图目标 URL</label>
                <input type="text" class="form-input" id="screenshotUrl" placeholder="http://...">
            </div>
            <div class="btn-group">
                <button type="button" class="btn-submit" id="saveSettingsBtn">保存</button>
                <button type="button" class="btn-close" onclick="closeSettingsModal()">关闭</button>
            </div>
        </div>
    </div>

    <script>
        const monthNames = ['', '1月', '2月', '3月', '4月', '5月', '6月', 
                           '7月', '8月', '9月', '10月', '11月', '12月'];
        
        const state = {
            year: new Date().getFullYear(),
            month: new Date().getMonth() + 1,
            authenticated: false,
            events: {},
            publicEvents: {}
        };

        async function apiCall(url, method = 'GET', body = null) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const r = await fetch(url, opts);
            return r.json();
        }

        async function login(user, pass) {
            const r = await apiCall('/login', 'POST', { username: user, password: pass });
            if (r.success) state.authenticated = true;
            return r;
        }

        async function logout() {
            const r = await apiCall('/logout', 'POST');
            if (r.success) state.authenticated = false;
            return r;
        }

        function openLoginModal() {
            document.getElementById('loginModal').classList.add('show');
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('show');
        }

        function openMonthSelector() {
            const picker = document.getElementById('monthPicker');
            picker.innerHTML = '';
            for (let m = 1; m <= 12; m++) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = monthNames[m];
                btn.className = 'month-btn';
                if (m === state.month) btn.classList.add('selected');
                btn.onclick = (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                };
                picker.appendChild(btn);
            }
            document.getElementById('yearInput').value = state.year;
            document.getElementById('monthModal').classList.add('show');
        }

        function closeMonthSelector() {
            document.getElementById('monthModal').classList.remove('show');
        }

        function openEventModal(date) {
            const d = new Date(date);
            document.getElementById('eventTitle').textContent = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
            document.getElementById('eventDate').value = date;
            document.getElementById('eventContent').value = '';
            document.getElementById('eventRecurrence').value = 'once';
            document.getElementById('eventPublic').checked = true;
            document.getElementById('eventModal').classList.add('show');
        }

        function closeEventModal() {
            document.getElementById('eventModal').classList.remove('show');
        }

        function updateUI() {
            const info = document.getElementById('userInfo');
            const btn = document.getElementById('loginBtn');
            
            if (state.authenticated) {
                info.classList.add('show');
                btn.style.display = 'none';
            } else {
                info.classList.remove('show');
                btn.style.display = 'block';
            }
        }

        async function renderCalendar() {
            try {
                const cal = await apiCall(`/api/calendar/${state.year}/${state.month}`);
                
                if (!cal.success || !cal.days || cal.days.length === 0) {
                    return;
                }
                
                document.getElementById('monthDisplay').textContent = monthNames[state.month];
                
                const container = document.getElementById('days');
                container.innerHTML = '';
                
                const today = new Date();
                const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
                
                cal.days.forEach((day) => {
                    const cell = document.createElement('div');
                    if (!day) {
                        cell.className = 'day';
                        cell.style.backgroundColor = '#FFFFFF';
                        container.appendChild(cell);
                        return;
                    }
                    
                    cell.className = 'day';
                    if (day.date === todayStr) cell.classList.add('today');
                    
                    let html = `<div class="day-num">${day.day}</div>`;
                    if (day.lunar) html += `<div class="day-lunar">${day.lunar}</div>`;
                    if (day.festival) html += `<div class="day-festival">${day.festival}</div>`;
                    
                    const events = [...(state.publicEvents[day.date] || [])];
                    if (state.authenticated) events.push(...(state.events[day.date] || []));
                    
                    if (events.length > 0) {
                        html += '<div class="day-events">' + 
                                events.map(e => `<div class="day-event">${e.content}</div>`).join('') +
                                '</div>';
                    }
                    
                    cell.innerHTML = html;
                    if (state.authenticated) cell.onclick = () => openEventModal(day.date);
                    container.appendChild(cell);
                });
            } catch (e) {
                console.error('renderCalendar错误:', e);
            }
        }

        async function loadEvents() {
            const pub = await apiCall(`/api/events/public/${state.year}/${state.month}`);
            state.publicEvents = pub.events || {};
            
            // 加载未来几个月的公开事项（不登录也能显示）
            for (let m = state.month + 1; m <= 12; m++) {
                const futurePublic = await apiCall(`/api/events/public/${state.year}/${m}`);
                if (futurePublic.events) {
                    Object.assign(state.publicEvents, futurePublic.events);
                }
            }
            
            if (state.authenticated) {
                try {
                    const user = await apiCall(`/api/events/${state.year}/${state.month}`);
                    state.events = user.events || {};
                    
                    for (let m = state.month + 1; m <= 12; m++) {
                        const futureEvents = await apiCall(`/api/events/${state.year}/${m}`);
                        if (futureEvents.events) {
                            Object.assign(state.events, futureEvents.events);
                        }
                    }
                } catch (e) {
                    state.events = {};
                }
            } else {
                state.events = {};
            }
        }

        async function renderReminders() {
            let allFutureEvents = [];
            
            for (let m = state.month + 1; m <= 12; m++) {
                for (const [dateStr, events] of Object.entries(state.publicEvents)) {
                    const eventDate = new Date(dateStr);
                    if (eventDate.getFullYear() === state.year && eventDate.getMonth() + 1 === m) {
                        events.forEach(event => {
                            allFutureEvents.push({ date: dateStr, content: event.content });
                        });
                    }
                }
                
                if (state.authenticated) {
                    for (const [dateStr, events] of Object.entries(state.events)) {
                        const eventDate = new Date(dateStr);
                        if (eventDate.getFullYear() === state.year && eventDate.getMonth() + 1 === m) {
                            events.forEach(event => {
                                if (!allFutureEvents.find(e => e.date === dateStr && e.content === event.content)) {
                                    allFutureEvents.push({ date: dateStr, content: event.content });
                                }
                            });
                        }
                    }
                }
            }
            
            allFutureEvents.sort((a, b) => new Date(a.date) - new Date(b.date));
            
            const remindersList = document.getElementById('remindersList');
            if (allFutureEvents.length === 0) {
                remindersList.innerHTML = '<div style="color:#999;font-size:0.85rem;">暂无事项</div>';
            } else {
                remindersList.innerHTML = allFutureEvents.map(item => `
                    <div class="reminder-item">
                        <span class="reminder-date">${item.date}</span>
                        <span class="reminder-content">${item.content}</span>
                    </div>
                `).join('');
            }
        }

        document.getElementById('loginBtn').addEventListener('click', openLoginModal);
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await logout();
            updateUI();
            await loadEvents();
            await renderCalendar();
            await renderReminders();
        });

        // 设置弹窗
        async function openSettingsModal() {
            document.getElementById('settingsMsg').innerHTML = '';
            const r = await apiCall('/api/config/screenshot-url');
            if (r.success) document.getElementById('screenshotUrl').value = r.url;
            document.getElementById('settingsModal').classList.add('show');
        }
        function closeSettingsModal() {
            document.getElementById('settingsModal').classList.remove('show');
        }
        document.getElementById('settingsBtn').addEventListener('click', openSettingsModal);
        document.getElementById('saveSettingsBtn').addEventListener('click', async () => {
            const url = document.getElementById('screenshotUrl').value.trim();
            const r = await apiCall('/api/config/screenshot-url', 'POST', { url });
            if (r.success) {
                document.getElementById('settingsMsg').innerHTML = '<div class="msg ok">已保存</div>';
                setTimeout(closeSettingsModal, 800);
            } else {
                document.getElementById('settingsMsg').innerHTML = `<div class="msg err">${r.message}</div>`;
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const r = await login(
                document.getElementById('loginUser').value.trim(),
                document.getElementById('loginPass').value.trim()
            );
            if (r.success) {
                document.getElementById('username').textContent = r.username;
                closeLoginModal();
                updateUI();
                await loadEvents();
                await renderCalendar();
                await renderReminders();
            } else {
                document.getElementById('loginMsg').innerHTML = `<div class="msg err">${r.message}</div>`;
            }
        });

        document.getElementById('monthForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const year = parseInt(document.getElementById('yearInput').value);
            const selectedBtn = document.querySelector('.month-btn.selected');
            if (selectedBtn) {
                const month = parseInt(selectedBtn.textContent.match(/\d+/)[0]);
                state.year = year;
                state.month = month;
                closeMonthSelector();
                await loadEvents();
                await renderCalendar();
                await renderReminders();
            }
        });

        document.getElementById('eventForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const content = document.getElementById('eventContent').value.trim();
            const dateStr = document.getElementById('eventDate').value;
            
            if (!content || !dateStr) {
                alert('请填写完整信息');
                return;
            }
            
            const r = await apiCall('/api/events', 'POST', {
                date_str: dateStr,
                content,
                recurrence: document.getElementById('eventRecurrence').value,
                is_public: document.getElementById('eventPublic').checked
            });
            
            if (r.success) {
                await loadEvents();
                await renderCalendar();
                await renderReminders();
                closeEventModal();
            }
        });

        async function init() {
            const auth = await apiCall('/auth/status');
            if (auth.authenticated) {
                state.authenticated = true;
                document.getElementById('username').textContent = auth.username;
            }
            await loadEvents();
            await renderCalendar();
            await renderReminders();
            updateUI();
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
